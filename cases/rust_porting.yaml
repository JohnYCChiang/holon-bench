track: rust_porting
cases:
  - id: rs-port-001
    track: rust_porting
    language: rust
    difficulty: easy
    task_type: schema_port
    fixture: fixtures/rust_porting/schema_structs
    user_request: Port the Python request/response dict schema to Rust serde structs.
    constraints:
      - Preserve JSON field names exactly.
      - Unknown fields must be rejected where the Python tool rejects them.
      - Golden Python and Rust outputs must match semantically.
    allowed_paths: [rust/src/schema.rs]
    forbidden_paths: [python/**, Cargo.toml]
    protected_paths: [python/**, rust/tests/**, rust/Cargo.toml, rust/Cargo.lock]
    solution_paths: [rust/src/schema.rs]
    verifier:
      commands: [cargo test --manifest-path rust/Cargo.toml --test schema_parity]
      hidden_commands: [sh -c 'cp hidden/schema_hidden.rs rust/tests/schema_hidden.rs; trap "rm -f rust/tests/schema_hidden.rs" EXIT; cargo test --manifest-path rust/Cargo.toml --test schema_hidden']
      mutation_commands: [sh -c 'cp hidden/schema_mutation.rs rust/tests/schema_mutation.rs; trap "rm -f rust/tests/schema_mutation.rs" EXIT; cargo test --manifest-path rust/Cargo.toml --test schema_mutation']
      semantic_checks: [python_rust_json_equivalence]
      timeout_seconds: 60
    scoring:
      hard_gates: [patch_applies, compiles, tests_pass, schema_valid, scope_pass, semantic_pass]
      soft_metrics: [contract_compliance, functional_correctness, test_quality]
    failure_tags: [python_rust_schema_mismatch, golden_output_mismatch]
