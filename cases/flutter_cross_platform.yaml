    failure_tags: [async_after_dispose, flaky_test, hidden_verifier_failed]
  - id: flutter-049
    track: flutter_cross_platform
    language: dart
    difficulty: hard
    task_type: platform_abstraction
    fixture: fixtures/flutter/dart_io_web_trap
    user_request: Remove dart:io usage from web-targeted code by introducing a platform abstraction.
    constraints:
      - Web build must not import dart:io.
      - Preserve native behavior.
      - Do not add a new dependency unless explicitly needed.
    allowed_paths: [lib/platform/**, lib/services/file_picker.dart, test/platform/**]
    forbidden_paths: [pubspec.yaml]
    protected_paths: [test/platform/**, hidden/**]
    solution_paths: [lib/platform/file_selector.dart, lib/services/file_picker.dart]
    verifier:
      commands: [flutter test test/platform, flutter build web --no-pub]
      hidden_commands: [python3 hidden/verify_web_platform_abstraction.py]
      semantic_checks: [no_dart_io_in_web_path]
      timeout_seconds: 180
    scoring:
      hard_gates: [patch_applies, compiles, tests_pass, safety_pass, semantic_pass]
      soft_metrics: [platform_compatibility, maintainability, scope_disciplined]
    failure_tags: [dart_io_on_web, dependency_added_without_permission, hidden_verifier_failed]
