track: flutter_cross_platform
cases:
  - id: flutter-004
    track: flutter_cross_platform
    language: dart
    difficulty: easy
    task_type: domain_validation
    fixture: fixtures/flutter/domain_validation
    user_request: Move domain validation out of the widget and into the domain service.
    constraints:
      - Widgets must not duplicate validation rules.
      - Add pure Dart tests for validation.
      - Preserve displayed error messages.
    allowed_paths: [lib/domain/**, lib/widgets/form_view.dart, test/domain/**, test/widget/**]
    forbidden_paths: [pubspec.yaml]
    protected_paths: [test/domain/**, test/widget/**]
    solution_paths: [lib/domain/registration_validator.dart, lib/widgets/form_view.dart]
    verifier:
      commands: [flutter test test/domain test/widget/form_view_test.dart]
      timeout_seconds: 120
    scoring:
      hard_gates: [patch_applies, compiles, tests_pass, scope_pass]
      soft_metrics: [maintainability, test_quality, functional_correctness]
    failure_tags: [domain_rule_violation, over_refactor]
  - id: flutter-011
    track: flutter_cross_platform
    language: dart
    difficulty: medium
    task_type: responsive_layout
    fixture: fixtures/flutter/responsive_narrow_width
    user_request: Fix the responsive layout so it works on narrow mobile widths.
    constraints:
      - No horizontal overflow at 320px width.
      - Preserve desktop layout density.
      - Add widget tests for narrow and wide constraints.
    allowed_paths: [lib/widgets/responsive_panel.dart, test/widget/responsive_panel_test.dart]
    forbidden_paths: [pubspec.yaml]
    protected_paths: [test/widget/responsive_panel_test.dart]
    solution_paths: [lib/widgets/responsive_panel.dart]
    verifier:
      commands: [flutter test test/widget/responsive_panel_test.dart]
      semantic_checks: [golden_layout_bounds]
      timeout_seconds: 120
    scoring:
      hard_gates: [patch_applies, compiles, tests_pass, semantic_pass]
      soft_metrics: [functional_correctness, test_quality, maintainability]
    failure_tags: [mobile_layout_break, over_refactor]
  - id: flutter-018
    track: flutter_cross_platform
    language: dart
    difficulty: hard
    task_type: state_management
    fixture: fixtures/flutter/riverpod_duplicate_network
    user_request: Prevent duplicate network calls when Riverpod state refreshes.
    constraints:
      - Preserve manual refresh behavior.
      - Avoid global mutable singleton state.
      - Add tests proving one request per logical refresh.
    allowed_paths: [lib/state/**, lib/services/**, test/state/**]
    forbidden_paths: [pubspec.yaml]
    protected_paths: [test/state/**, hidden/**]
    solution_paths: [lib/state/user_controller.dart]
    verifier:
      commands: [flutter test test/state]
      hidden_commands: [sh -c 'cp hidden/user_controller_hidden_test.dart test/state/user_controller_hidden_test.dart; trap "rm -f test/state/user_controller_hidden_test.dart" EXIT; flutter test test/state/user_controller_hidden_test.dart']
      mutation_commands: [sh -c 'cp hidden/user_controller_mutation_test.dart test/state/user_controller_mutation_test.dart; trap "rm -f test/state/user_controller_mutation_test.dart" EXIT; flutter test test/state/user_controller_mutation_test.dart']
      timeout_seconds: 120
    scoring:
      hard_gates: [patch_applies, compiles, tests_pass, scope_pass]
      soft_metrics: [functional_correctness, maintainability, test_quality]
    failure_tags: [wrong_edge_case, over_refactor, hidden_verifier_failed, mutation_verifier_failed]
