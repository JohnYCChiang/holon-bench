track: go_core
cases:
  - id: go-core-004
    track: go_core
    language: go
    difficulty: easy
    task_type: error_wrapping
    fixture: fixtures/go/error_wrapping
    user_request: Preserve error wrapping context instead of swallowing the underlying error.
    constraints:
      - errors.Is must still match sentinel errors.
      - Add table-driven tests.
      - Do not change exported function names.
    allowed_paths: [internal/loader/**, internal/loader/*_test.go]
    forbidden_paths: [go.mod]
    protected_paths: [internal/loader/*_test.go, hidden/**]
    solution_paths: [internal/loader/loader.go]
    verifier:
      commands: [go test ./internal/loader]
      hidden_commands: [sh -c 'cp hidden/loader_hidden_test.go internal/loader/loader_hidden_test.go; trap "rm -f internal/loader/loader_hidden_test.go" EXIT; go test ./internal/loader -run Hidden -count=1']
      mutation_commands: [sh -c 'cp hidden/loader_mutation_test.go internal/loader/loader_mutation_test.go; trap "rm -f internal/loader/loader_mutation_test.go" EXIT; go test ./internal/loader -run Mutation -count=1']
      timeout_seconds: 60
    scoring:
      hard_gates: [patch_applies, compiles, tests_pass, scope_pass]
      soft_metrics: [maintainability, test_quality, functional_correctness]
    failure_tags: [missing_requirement, public_api_break, hidden_verifier_failed, mutation_verifier_failed]
  - id: go-core-009
    track: go_core
    language: go
    difficulty: medium
    task_type: interface_boundary
    fixture: fixtures/go/interface_extension
    user_request: Add optional capability discovery without breaking existing implementations.
    constraints:
      - Do not add required methods to the existing interface.
      - Use a narrow optional interface.
      - Existing mock implementations must compile.
