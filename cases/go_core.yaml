    failure_tags: [public_api_break, over_refactor, hidden_verifier_failed]
  - id: go-core-015
    track: go_core
    language: go
    difficulty: hard
    task_type: context_cancellation
    fixture: fixtures/go/context_cancel_worker
    user_request: Ensure workers exit promptly when context is cancelled.
    constraints:
      - No goroutine leaks.
      - Do not use sleeps in tests except bounded polling helpers.
      - Preserve output channel close behavior.
    allowed_paths: [internal/worker/**, internal/worker/*_test.go]
    forbidden_paths: [go.mod]
    protected_paths: [internal/worker/*_test.go, hidden/**]
    solution_paths: [internal/worker/worker.go]
    verifier:
      commands: [go test ./internal/worker -run Cancel -count=1]
      hidden_commands: [sh -c 'cp hidden/worker_lifecycle_hidden_test.go internal/worker/worker_lifecycle_hidden_test.go; trap "rm -f internal/worker/worker_lifecycle_hidden_test.go" EXIT; go test ./internal/worker -run Hidden -count=1']
      timeout_seconds: 60
    scoring:
      hard_gates: [patch_applies, compiles, tests_pass, safety_pass]
      soft_metrics: [functional_correctness, test_quality, maintainability]
    failure_tags: [goroutine_leak, cancellation_ignored, flaky_test, hidden_verifier_failed]
  - id: go-core-022
    track: go_core
    language: go
    difficulty: hard
    task_type: channel_safety
    fixture: fixtures/go/channel_deadlock
    user_request: Fix the channel send deadlock while preserving backpressure semantics.
    constraints:
      - Do not drop messages silently.
      - Do not spawn unbounded goroutines.
      - Race detector must pass.
    allowed_paths: [internal/queue/**, internal/queue/*_test.go]
    forbidden_paths: [go.mod]
    protected_paths: [internal/queue/*_test.go, hidden/**]
    solution_paths: [internal/queue/queue.go]
    verifier:
      commands: [go test -race ./internal/queue]
      hidden_commands: [sh -c 'cp hidden/queue_backpressure_hidden_test.go internal/queue/queue_backpressure_hidden_test.go; trap "rm -f internal/queue/queue_backpressure_hidden_test.go" EXIT; go test -race ./internal/queue']
      timeout_seconds: 90
    scoring:
      hard_gates: [patch_applies, compiles, tests_pass, safety_pass]
      soft_metrics: [functional_correctness, maintainability, test_quality]
    failure_tags: [deadlock, race_condition, resource_leak, hidden_verifier_failed]
