      soft_metrics: [functional_correctness, contract_compliance, maintainability]
    failure_tags: [domain_rule_violation, missing_requirement, wrong_edge_case, over_refactor]

  - id: ddd-first-005
    track: ddd_first
    language: python
    difficulty: hard
    task_type: overlap_invariant
    fixture: fixtures/ddd_first/booking_overlap
    user_request: >
      Implement the Scheduling domain in src/booking.py so reservations never overlap:
      an immutable Interval value object using half-open ranges, and a Calendar
      aggregate that rejects overlapping or invalid bookings without mutating state.
      Follow DOMAIN.md.
    constraints:
      - Interval is immutable; start and end are integers with start < end (ValueError otherwise).
      - Half-open ranges that merely touch at an endpoint do not overlap.
      - A booking overlapping any existing reservation is rejected and must not mutate state.
      - Do not edit DOMAIN.md or any test.
    allowed_paths: [src/**]
    forbidden_paths: [DOMAIN.md]
    protected_paths: [tests/**, hidden/**]
