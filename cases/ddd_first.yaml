      and the reorder policy restocks idempotently. Follow DOMAIN.md.
    constraints:
      - Reserving more than available raises ValueError and does not mutate state.
      - StockDepleted is emitted exactly once per depletion, recurring only after restock.
      - apply_reorder_policy is idempotent — no duplicate Reordered events.
      - Do not edit DOMAIN.md or any test.
