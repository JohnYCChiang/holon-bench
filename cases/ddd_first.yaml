  - id: ddd-first-007
    track: ddd_first
    language: python
    difficulty: hard
    task_type: double_entry_balance
    fixture: fixtures/ddd_first/ledger_double_entry
    user_request: >
      Implement Ledger in src/ledger.py enforcing the double-entry invariant: every
      posting must have at least two non-zero legs that sum to zero, and an unbalanced
      posting must be rejected without mutating any balance. Follow DOMAIN.md.
    constraints:
      - A posting needs at least two legs, each a non-zero integer amount (ValueError otherwise).
      - Legs must sum to exactly zero; an unbalanced posting is rejected with no partial mutation.
      - balance returns 0 for unknown accounts; is_balanced holds after every accepted posting.
      - Do not edit DOMAIN.md or any test.
    allowed_paths: [src/**]
