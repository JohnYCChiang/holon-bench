  - id: ddd-first-004
    track: ddd_first
    language: python
    difficulty: medium
    task_type: pricing_value_object
    fixture: fixtures/ddd_first/cart_pricing
    user_request: >
      Implement the Pricing domain in src/cart.py so the scenarios pass: an immutable
      Discount value object that floors a percentage reduction, and a Cart aggregate
      that enforces positive prices/quantities and carries at most one discount.
      Follow DOMAIN.md.
    constraints:
      - Discount is immutable; percent must be an integer in 0..100 (ValueError otherwise).
      - apply_to rounds down — amount - (amount * percent) // 100.
      - unit_price and quantity must be positive integers; rejected commands leave state unchanged.
      - A cart carries at most one discount; a second apply_discount is rejected without replacing the first.
      - Do not edit DOMAIN.md or any test.
    allowed_paths: [src/**]
    forbidden_paths: [DOMAIN.md]
    protected_paths: [tests/**, hidden/**]
    solution_paths: [src/cart.py]
    verifier:
      commands: [python3 -m unittest tests.test_scenarios]
      hidden_commands: [python3 -m unittest hidden.test_cart_hidden]
      mutation_commands: [python3 -m unittest hidden.test_cart_mutation]
