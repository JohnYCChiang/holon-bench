track: ddd_first
cases:
  - id: ddd-first-001
    track: ddd_first
    language: python
    difficulty: medium
    task_type: value_object_aggregate
    fixture: fixtures/ddd_first/orders_value_object
    user_request: >
      Implement the Ordering domain in src/orders.py so the scenarios pass: a
      value-object Money with by-value equality and currency-safe addition, and an
      Order aggregate that enforces a single currency and positive quantities and
      computes a correct total. Follow DOMAIN.md.
    constraints:
      - Money is immutable and compares by value.
      - All order line items must share the order currency; quantities must be positive.
      - Cross-currency operations raise ValueError.
      - Do not edit DOMAIN.md or any test.
    allowed_paths: [src/**]
    forbidden_paths: [DOMAIN.md]
    protected_paths: [tests/**, hidden/**]
    solution_paths: [src/orders.py]
    verifier:
      commands: [python3 -m unittest tests.test_scenarios]
      hidden_commands: [python3 -m unittest hidden.test_orders_hidden]
      mutation_commands: [python3 -m unittest hidden.test_orders_mutation]
      timeout_seconds: 30
    scoring:
      hard_gates: [patch_applies, tests_pass, scope_pass]
      soft_metrics: [functional_correctness, contract_compliance, maintainability]
    failure_tags: [domain_rule_violation, missing_requirement, wrong_edge_case, over_refactor]

