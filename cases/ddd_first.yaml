  - id: ddd-first-010
    track: ddd_first
    language: python
    difficulty: expert
    task_type: multi_aggregate_transfer
    fixture: fixtures/ddd_first/wallet_holds
    user_request: >
      Implement Bank in src/wallet.py with two-phase transfers via holds: place_hold
      reserves funds, capture moves them between wallets, release frees them, money is
      conserved across all wallets, and non-active holds cannot be captured or released.
      Follow DOMAIN.md.
    constraints:
      - place_hold requires available funds; a rejected hold must not mutate state or emit events.
      - capture moves the held amount to another wallet and conserves total balance; capturing a non-active hold is rejected.
      - release frees a hold's reserved funds exactly once; double capture/release is rejected.
      - Do not edit DOMAIN.md or any test.
    allowed_paths: [src/**]
    forbidden_paths: [DOMAIN.md]
    protected_paths: [tests/**, hidden/**]
    solution_paths: [src/wallet.py]
    verifier:
      commands: [python3 -m unittest tests.test_scenarios]
      hidden_commands: [python3 -m unittest hidden.test_wallet_hidden]
      mutation_commands: [python3 -m unittest hidden.test_wallet_mutation]
