    task_type: poise_stagger_authority
    fixture: fixtures/martial_rpg/poise_stagger
    user_request: >
      ApplyPoiseDamage in internal/poise/poise.go drives poise negative and
      trusts the client's stagger claim. Make it authoritative: poise never goes
      negative, a break (poise reaching 0 or below) staggers and restores poise
      to MaxPoise, and the client's ClientStaggered flag is ignored. Keep the
      signature.
    constraints:
      - Poise must never go negative.
      - A break (poise <= 0) staggers and restores poise to MaxPoise.
      - Never trust ClientStaggered; compute stagger from server state only.
      - Negative PoiseDamage must not heal poise.
      - Do not edit go.mod or the provided test.
    allowed_paths: [internal/**]
    forbidden_paths: [go.mod]
