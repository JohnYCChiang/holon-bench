  - id: martial-rpg-009
    track: martial_rpg
    language: rust
    difficulty: expert
    task_type: deterministic_replay_rng
    fixture: fixtures/martial_rpg/replay_rng
    user_request: >
      ReplayRng::roll_for in src/lib.rs threads a mutable internal state, so a
      roll depends on how many rolls came before and replays processed in a
      different order diverge. Make roll_for a pure function of (seed, entity_id,
      tick) with good avalanche so distinct coordinates differ, preserving the
      roll_for(&mut self, ...) signature.
    constraints:
      - roll_for depends only on (seed, entity_id, tick), never on call order.
      - The same coordinates always yield the same value (replay parity).
      - Distinct entity_id or tick values yield well-mixed distinct outputs.
      - Different seeds yield different streams.
      - Do not edit Cargo.toml or the provided test.
    allowed_paths: [src/**]
    forbidden_paths: [Cargo.toml]
    protected_paths: [tests/rng.rs, hidden/**]
    solution_paths: [src/lib.rs]
    verifier:
      commands: [cargo test --test rng]
      hidden_commands: ["sh -c 'cp hidden/rng_hidden.rs tests/rng_hidden.rs; trap \"rm -f tests/rng_hidden.rs\" EXIT; cargo test --test rng_hidden'"]
      mutation_commands: ["sh -c 'cp hidden/rng_mutation.rs tests/rng_mutation.rs; trap \"rm -f tests/rng_mutation.rs\" EXIT; cargo test --test rng_mutation'"]
      timeout_seconds: 120
    scoring:
      hard_gates: [patch_applies, compiles, tests_pass, scope_pass]
      soft_metrics: [functional_correctness, contract_compliance, test_quality]
    failure_tags: [behavior_not_equivalent, golden_output_mismatch, wrong_edge_case, mutation_verifier_failed]

