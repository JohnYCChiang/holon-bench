    fixture: fixtures/martial_rpg/damage_mitigation
    user_request: >
      mitigate in src/lib.rs applies the resist percentage before armor and can
      return negative damage. Fix the pipeline so armor (flat) is applied first,
      then resist (percentage) on the remainder, with resist_pct clamped to
      [0,100] and the result floored at 0. Keep the public mitigate/Mitigation API.
    constraints:
      - Apply flat armor first, then percentage resist on the post-armor value.
      - resist_pct is clamped to [0,100].
      - The mitigated result is floored at 0 (never negative).
      - Do not edit Cargo.toml or the provided test.
    allowed_paths: [src/**]
    forbidden_paths: [Cargo.toml]
