  - id: martial-rpg-005
    track: martial_rpg
    language: rust
    difficulty: hard
    task_type: status_stack_merge
    fixture: fixtures/martial_rpg/status_stacking
    user_request: >
      merge_stacks in src/lib.rs returns effects in first-seen insertion order
      and never clamps a stacked total to the cap. Make it authoritative: sum
      magnitudes per effect id, clamp each id's total to [-cap, cap], and emit
      exactly one entry per id sorted by ascending id so the result is the same
      regardless of submission order. Keep the public Stack/merge_stacks API.
    constraints:
      - Output is one entry per id, sorted by ascending id (order-independent).
      - Per-id totals are the sum of magnitudes clamped to [-cap, cap].
      - Distinct ids are never merged; duplicate ids always are.
      - Do not edit Cargo.toml or the provided test.
    allowed_paths: [src/**]
    forbidden_paths: [Cargo.toml]
    protected_paths: [tests/stacking.rs, hidden/**]
    solution_paths: [src/lib.rs]
    verifier:
      commands: [cargo test --test stacking]
      hidden_commands: ["sh -c 'cp hidden/stacking_hidden.rs tests/stacking_hidden.rs; trap \"rm -f tests/stacking_hidden.rs\" EXIT; cargo test --test stacking_hidden'"]
      mutation_commands: ["sh -c 'cp hidden/stacking_mutation.rs tests/stacking_mutation.rs; trap \"rm -f tests/stacking_mutation.rs\" EXIT; cargo test --test stacking_mutation'"]
      timeout_seconds: 120
    scoring:
      hard_gates: [patch_applies, compiles, tests_pass, scope_pass]
      soft_metrics: [functional_correctness, contract_compliance, maintainability]
    failure_tags: [domain_rule_violation, wrong_edge_case, over_refactor, mutation_verifier_failed]

  - id: martial-rpg-006
    track: martial_rpg
    language: go
    difficulty: medium
    task_type: combo_window_authority
    fixture: fixtures/martial_rpg/combo_window
    user_request: >
      Advance in internal/combo/combo.go trusts the client's combo count. Make
      it authoritative: increment the count by 1 only when the hit lands strictly
      after LastTick and within Window ticks, otherwise reset to 1, and never
      read ClientCount. Keep the Advance signature.
    constraints:
      - Combo count is computed by the server, never from ClientCount.
      - A hit extends the chain only when 0 < (Tick - LastTick) <= Window.
      - Duplicate or backwards ticks reset the chain to 1.
      - Do not edit go.mod or the provided test.
    allowed_paths: [internal/**]
    forbidden_paths: [go.mod]
    protected_paths: [internal/combo/combo_test.go, hidden/**]
    solution_paths: [internal/combo/combo.go]
    verifier:
      commands: [go test ./internal/combo -count=1]
      hidden_commands: ["sh -c 'cp hidden/combo_hidden_test.go internal/combo/combo_hidden_test.go; trap \"rm -f internal/combo/combo_hidden_test.go\" EXIT; go test ./internal/combo -run Hidden -count=1'"]
      mutation_commands: ["sh -c 'cp hidden/combo_mutation_test.go internal/combo/combo_mutation_test.go; trap \"rm -f internal/combo/combo_mutation_test.go\" EXIT; go test ./internal/combo -run Mutation -count=1'"]
      timeout_seconds: 60
    scoring:
      hard_gates: [patch_applies, compiles, tests_pass, scope_pass]
      soft_metrics: [functional_correctness, maintainability, test_quality]
    failure_tags: [domain_rule_violation, state_sync_corruption, missing_requirement, mutation_verifier_failed]

