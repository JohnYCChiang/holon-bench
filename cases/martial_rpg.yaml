  - id: martial-rpg-008
    track: martial_rpg
    language: go
    difficulty: hard
    task_type: authoritative_movement_clamp
    fixture: fixtures/martial_rpg/authoritative_move
    user_request: >
      ResolveMove in internal/movement/movement.go returns the client's desired
      position verbatim, allowing teleports. Make it authoritative: clamp the
      per-axis displacement from Current to [-MaxSpeed, MaxSpeed] (treating a
      negative MaxSpeed as 0) and return Current plus the clamped delta. Keep the
      ResolveMove signature.
    constraints:
      - Per-axis displacement is clamped to [-MaxSpeed, MaxSpeed].
      - A negative MaxSpeed is treated as 0 (no movement).
      - Moves already within speed are preserved exactly.
      - Never return the client's Desired position unclamped.
      - Do not edit go.mod or the provided test.
    allowed_paths: [internal/**]
    forbidden_paths: [go.mod]
