      mutation_commands: ["sh -c 'cp hidden/mitigation_mutation.rs tests/mitigation_mutation.rs; trap \"rm -f tests/mitigation_mutation.rs\" EXIT; cargo test --test mitigation_mutation'"]
      timeout_seconds: 120
