      mutation_commands: ["sh -c 'cp hidden/poise_mutation_test.go internal/poise/poise_mutation_test.go; trap \"rm -f internal/poise/poise_mutation_test.go\" EXIT; go test ./internal/poise -run Mutation -count=1'"]
      timeout_seconds: 60
    scoring:
      hard_gates: [patch_applies, compiles, tests_pass, scope_pass]
      soft_metrics: [functional_correctness, maintainability, test_quality]
