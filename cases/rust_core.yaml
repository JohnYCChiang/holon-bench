track: rust_core
cases:
  - id: rs-core-003
    track: rust_core
    language: rust
    difficulty: easy
    task_type: typed_error
    fixture: fixtures/rust/typed_error_propagation
    user_request: Replace unwrap-based parsing with typed error propagation.
    constraints:
      - Do not panic on malformed input.
      - Preserve public function names.
      - Add regression tests for each error variant.
    allowed_paths: [src/parser.rs, src/error.rs, tests/parser_errors.rs]
    forbidden_paths: [Cargo.toml]
    protected_paths: [tests/parser_errors.rs]
    solution_paths: [src/parser.rs, src/error.rs]
    verifier:
      commands: [cargo test --test parser_errors]
      timeout_seconds: 60
    scoring:
      hard_gates: [patch_applies, compiles, tests_pass, scope_pass]
      soft_metrics: [functional_correctness, maintainability, test_quality]
    failure_tags: [compile_fail, missing_requirement, public_api_break]
  - id: rs-core-007
    track: rust_core
    language: rust
    difficulty: medium
    task_type: borrow_fix
    fixture: fixtures/rust/borrow_without_clone
    user_request: Fix the borrow conflict without cloning the large payload.
    constraints:
      - Do not clone LargePayload.
      - Preserve O(n) behavior.
      - Keep public API unchanged.
    allowed_paths: [src/aggregator.rs, tests/aggregator.rs]
    forbidden_paths: [Cargo.toml]
    protected_paths: [tests/aggregator.rs]
    solution_paths: [src/aggregator.rs]
    verifier:
      commands: [cargo test --test aggregator]
      timeout_seconds: 60
    scoring:
      hard_gates: [patch_applies, compiles, tests_pass, scope_pass]
      soft_metrics: [functional_correctness, minimality, maintainability]
    failure_tags: [compile_fail, over_refactor, public_api_break]
  - id: rs-core-014
    track: rust_core
    language: rust
    difficulty: medium
    task_type: trait_boundary
    fixture: fixtures/rust/trait_adapter
    user_request: Add a trait implementation for the new adapter without breaking existing implementers.
    constraints:
      - Do not add required methods to the existing trait.
      - Keep existing implementations compiling.
      - Add tests for adapter dispatch.
    allowed_paths: [src/traits.rs, src/adapters/**, tests/adapter_dispatch.rs]
    forbidden_paths: [Cargo.toml]
    protected_paths: [tests/adapter_dispatch.rs, tests/existing_impls.rs, hidden/**]
    solution_paths: [src/adapters/prefix.rs]
    verifier:
      commands: [cargo test --test adapter_dispatch, cargo test --test existing_impls]
      hidden_commands: [sh -c 'cp hidden/adapter_boundary_hidden.rs tests/adapter_boundary_hidden.rs; trap "rm -f tests/adapter_boundary_hidden.rs" EXIT; cargo test --test adapter_boundary_hidden']
      timeout_seconds: 60
    scoring:
      hard_gates: [patch_applies, compiles, tests_pass, scope_pass]
      soft_metrics: [contract_compliance, maintainability, test_quality]
    failure_tags: [public_api_break, missing_requirement, hidden_verifier_failed]
  - id: rs-core-021
    track: rust_core
    language: rust
    difficulty: hard
    task_type: async_cancellation
    fixture: fixtures/rust/tokio_cancellation
    user_request: Ensure cancellation releases the resource lock and stops the background task.
    constraints:
      - Do not leak spawned tasks.
      - Use tokio cancellation primitives or select.
      - Avoid sleep-based flaky tests.
    allowed_paths: [src/worker.rs, tests/worker_cancellation.rs]
    forbidden_paths: [Cargo.toml]
    protected_paths: [tests/worker_cancellation.rs, hidden/**]
    solution_paths: [src/worker.rs]
    verifier:
      commands: [cargo test --test worker_cancellation]
      hidden_commands: [sh -c 'cp hidden/worker_cancellation_hidden.rs tests/worker_cancellation_hidden.rs; trap "rm -f tests/worker_cancellation_hidden.rs" EXIT; cargo test --test worker_cancellation_hidden']
      timeout_seconds: 90
    scoring:
      hard_gates: [patch_applies, compiles, tests_pass, safety_pass]
      soft_metrics: [functional_correctness, test_quality, maintainability]
    failure_tags: [cancellation_ignored, resource_leak, flaky_test, hidden_verifier_failed]
  - id: rs-core-030
    track: rust_core
    language: rust
    difficulty: medium
    task_type: serde_compatibility
    fixture: fixtures/rust/serde_backward_compat
    user_request: Add the new optional field without breaking old serialized data.
    constraints:
      - Existing JSON fixtures must still deserialize.
      - New field must be omitted when None.
      - Do not rename existing fields.
    allowed_paths: [src/schema.rs, tests/serde_compat.rs, tests/fixtures/**]
    forbidden_paths: [Cargo.toml]
    protected_paths: [tests/serde_compat.rs, tests/fixtures/**, hidden/**]
    solution_paths: [src/schema.rs]
    verifier:
      commands: [cargo test --test serde_compat]
      hidden_commands: [sh -c 'cp hidden/serde_compat_hidden.rs tests/serde_compat_hidden.rs; trap "rm -f tests/serde_compat_hidden.rs" EXIT; cargo test --test serde_compat_hidden']
      timeout_seconds: 60
    scoring:
      hard_gates: [patch_applies, compiles, tests_pass, schema_valid]
      soft_metrics: [contract_compliance, functional_correctness, test_quality]
    failure_tags: [backward_incompatibility, response_schema_break, hidden_verifier_failed]
