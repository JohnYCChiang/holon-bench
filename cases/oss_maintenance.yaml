  - id: oss-maint-008
    track: oss_maintenance
    language: rust
    difficulty: medium
    task_type: checksum_overflow_repair
    fixture: fixtures/oss_maintenance/rust_checksum_overflow
    user_request: >
      A user reports a panic (see BUG.md): checksum's u32 multiply-add overflows
      and aborts in debug builds. Reproduce, fix the root cause minimally so the
      arithmetic wraps modulo 2^32 (never panics) while keeping the same values,
      and leave behind a regression test that pins the wrapping behavior.
    constraints:
      - Preserve the checksum(&[u8]) -> u32 signature and the multiply-add recurrence.
      - Arithmetic wraps modulo 2^32; the function must never panic on overflow.
      - Do not saturate or clamp — overflowing inputs must equal the exact wrapped value.
      - Do not edit Cargo.toml or the provided acceptance test.
    allowed_paths: [src/**]
    forbidden_paths: [BUG.md, Cargo.toml]
    protected_paths: [tests/checksum.rs, hidden/**]
    solution_paths: [src/lib.rs]
    verifier:
      commands: [cargo test --test checksum]
      hidden_commands: ["sh -c 'cp hidden/checksum_hidden.rs tests/checksum_hidden.rs; trap \"rm -f tests/checksum_hidden.rs\" EXIT; cargo test --test checksum_hidden'"]
      mutation_commands: ["sh -c 'cp hidden/checksum_mutation.rs tests/checksum_mutation.rs; trap \"rm -f tests/checksum_mutation.rs\" EXIT; cargo test --test checksum_mutation'"]
      timeout_seconds: 120
    scoring:
      hard_gates: [patch_applies, compiles, tests_pass, scope_pass]
      soft_metrics: [functional_correctness, minimality, test_quality]
    failure_tags: [wrong_edge_case, domain_rule_violation, missing_test, mutation_verifier_failed]

  - id: oss-maint-009
    track: oss_maintenance
    language: rust
    difficulty: hard
    task_type: parse_error_repair
    fixture: fixtures/oss_maintenance/rust_kv_parse_error
    user_request: >
      A user reports a panic (see BUG.md): parse_kv unwraps the result of
      find('=') and aborts on a line with no delimiter. Reproduce, fix the root
      cause minimally so malformed input returns Err(MissingDelimiter) instead of
      panicking, keep the first-'=' split so values may contain '=', and leave
      behind a regression test.
    constraints:
      - Preserve the parse_kv signature and the ParseError variants.
      - Missing '=' returns Err(MissingDelimiter); empty key returns Err(EmptyKey); never panic.
      - Split on the FIRST '=' so the value may itself contain '='.
      - Do not edit Cargo.toml or the provided acceptance test.
    allowed_paths: [src/**]
    forbidden_paths: [BUG.md, Cargo.toml]
    protected_paths: [tests/parse.rs, hidden/**]
    solution_paths: [src/lib.rs]
    verifier:
      commands: [cargo test --test parse]
      hidden_commands: ["sh -c 'cp hidden/parse_hidden.rs tests/parse_hidden.rs; trap \"rm -f tests/parse_hidden.rs\" EXIT; cargo test --test parse_hidden'"]
      mutation_commands: ["sh -c 'cp hidden/parse_mutation.rs tests/parse_mutation.rs; trap \"rm -f tests/parse_mutation.rs\" EXIT; cargo test --test parse_mutation'"]
      timeout_seconds: 120
    scoring:
      hard_gates: [patch_applies, compiles, tests_pass, scope_pass]
      soft_metrics: [functional_correctness, minimality, test_quality]
    failure_tags: [unstructured_error, error_taxonomy_mismatch, missing_test, mutation_verifier_failed]

  - id: oss-maint-010
    track: oss_maintenance
    language: rust
    difficulty: expert
    task_type: ringbuffer_boundary_repair
    fixture: fixtures/oss_maintenance/rust_ring_buffer
    user_request: >
      A service owner reports a panic (see BUG.md): RingBuffer::to_vec computes
      head + i without reducing modulo capacity, so after the buffer wraps the
      read index walks off the backing storage. Reproduce, fix the boundary
      handling minimally so to_vec always returns the live elements oldest ->
      newest, and leave behind a regression test.
    constraints:
      - Preserve the RingBuffer new/push/to_vec API and overwrite-oldest semantics.
      - to_vec returns the live elements oldest -> newest across any number of wraps.
      - The read index must be reduced modulo capacity; do not clamp or reorder slots.
      - Do not edit Cargo.toml or the provided acceptance test.
    allowed_paths: [src/**]
    forbidden_paths: [BUG.md, Cargo.toml]
    protected_paths: [tests/ring.rs, hidden/**]
    solution_paths: [src/lib.rs]
    verifier:
      commands: [cargo test --test ring]
      hidden_commands: ["sh -c 'cp hidden/ring_hidden.rs tests/ring_hidden.rs; trap \"rm -f tests/ring_hidden.rs\" EXIT; cargo test --test ring_hidden'"]
      mutation_commands: ["sh -c 'cp hidden/ring_mutation.rs tests/ring_mutation.rs; trap \"rm -f tests/ring_mutation.rs\" EXIT; cargo test --test ring_mutation'"]
      timeout_seconds: 120
    scoring:
      hard_gates: [patch_applies, compiles, tests_pass, scope_pass]
      soft_metrics: [functional_correctness, minimality, maintainability]
    failure_tags: [wrong_edge_case, missing_requirement, over_refactor, mutation_verifier_failed]
