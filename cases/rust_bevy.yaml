track: rust_bevy
cases:
  - id: bevy-002
    track: rust_bevy
    language: rust
    difficulty: easy
    task_type: component_bundle
    fixture: fixtures/bevy/health_component
    user_request: Add a Health component and bundle without putting behavior into the component.
    constraints:
      - Components must be data-only.
      - Existing spawn systems must keep compiling.
      - Add pure tests for damage application.
    allowed_paths: [src/components/**, src/systems/health.rs, tests/health_logic.rs]
    forbidden_paths: [Cargo.toml]
    protected_paths: [tests/health_logic.rs]
    solution_paths: [src/systems/health.rs]
    verifier:
      commands: [cargo test health_logic]
      timeout_seconds: 90
    scoring:
      hard_gates: [patch_applies, compiles, tests_pass, scope_pass]
      soft_metrics: [maintainability, test_quality, functional_correctness]
    failure_tags: [domain_rule_violation, over_refactor]
