    fixture: fixtures/bevy/query_mutability_conflict
    user_request: Fix the Bevy query mutability conflict without splitting game state incorrectly.
    constraints:
      - Do not use unsafe.
      - Preserve system behavior.
      - Prefer query filtering or param restructuring over global resources.
    allowed_paths: [src/systems/movement.rs, tests/movement_system.rs]
    forbidden_paths: [Cargo.toml]
    protected_paths: [tests/movement_system.rs]
    solution_paths: [src/systems/movement.rs]
