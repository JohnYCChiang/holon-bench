    track: rust_bevy
    language: rust
    difficulty: medium
    task_type: asset_abstraction
    fixture: fixtures/bevy/desktop_filesystem_trap
    user_request: Replace direct desktop filesystem loading with Bevy asset abstraction.
    constraints:
      - Must work for native and wasm builds.
      - Do not use std::fs in gameplay code.
      - Preserve asset path configuration.
    allowed_paths: [src/assets/**, src/plugins/assets.rs, tests/asset_paths.rs]
    forbidden_paths: [Cargo.toml]
    protected_paths: [tests/asset_paths.rs]
    solution_paths: [src/assets/loader.rs, src/plugins/assets.rs]
