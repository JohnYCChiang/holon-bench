  - id: repair-go-game-063
    track: repair_needed
    language: go
    difficulty: hard
    task_type: repair_session_heartbeat_expiry
    fixture: fixtures/go_game/session_heartbeat
    user_request: >
      Repair session heartbeat expiry so heartbeats extend deadlines by TTL
      and expiration keeps the renewed session alive.
    constraints:
      - Heartbeat must return false for unknown sessions.
      - Heartbeat must extend deadline to now + TTL.
      - Expire must remove only expired sessions.
    allowed_paths: [server/session/**]
    forbidden_paths: [go.mod]
    protected_paths: [server/session/*_test.go]
    solution_paths: [server/session/heartbeat.go]
    repair_seed_artifact:
      server/session/heartbeat.go: |
        package session

        type Session struct {
          ID       string
          Deadline int
        }

        type Store struct {
          Sessions map[string]Session
          TTL      int
        }

        func (s *Store) Heartbeat(id string, now int) bool {
          session, ok := s.Sessions[id]
          if !ok {
            return false
          }
          session.Deadline = now
          s.Sessions[id] = session
          return true
        }

        func (s *Store) Expire(now int) []string {
          expired := []string{}
          for id, session := range s.Sessions {
            if session.Deadline <= now {
              expired = append(expired, id)
              delete(s.Sessions, id)
            }
          }
          return expired
        }
    verifier:
      commands: [go test ./server/session]
      timeout_seconds: 60
    scoring:
      hard_gates: [patch_applies, compiles, tests_pass, schema_valid]
      soft_metrics: [repair_conversion, game_system_correctness, deterministic_behavior]
    failure_tags: [repair_failed, wrong_edge_case]

