    track: go_game_server
    language: go
    difficulty: easy
    task_type: room_host_transfer
    fixture: fixtures/go_game/host_transfer
    user_request: Transfer host ownership correctly when the current host leaves a room.
    constraints:
      - Pick the oldest connected player as new host.
      - Empty rooms must close.
      - Do not mutate unrelated rooms.
    allowed_paths: [server/room/**, server/room/*_test.go]
    forbidden_paths: [go.mod]
    protected_paths: [server/room/*_test.go]
    solution_paths: [server/room/room.go]
    verifier:
      commands: [go test ./server/room]
      hidden_commands: [sh -c 'cp hidden/room_hidden_test.go server/room/room_hidden_test.go; trap "rm -f server/room/room_hidden_test.go" EXIT; go test ./server/room -run Hidden -count=1']
