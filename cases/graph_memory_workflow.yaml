  - id: kg-use-009
    track: graph_memory_workflow
    language: python
    difficulty: hard
    task_type: graph_relation_following
    fixture: fixtures/python/graph_approval_threshold
    user_request: >
      Extend needs_approval with the stored spend-approval policy. The threshold
      and the privileged-role exemption are recorded as related nodes and must be
      recovered from project memory before implementing behavior.
    constraints:
      - Preserve needs_approval(request) as the public API returning a bool.
      - Small spend stays auto-approved; the rule is not present in source files.
      - Do not hard-code unrelated examples from visible tests.
    knowledge_seed:
      - name: Spend Threshold Policy
        kind: decision
        description: >
          Spend requests strictly above 5000 require approval. The threshold value
          itself does not require approval.
        relates_to: [Privileged Role Requirement]
      - name: Privileged Role Requirement
        kind: requirement
        description: >
          The "director" role is privileged and exempt from approval for any
          amount; all other roles are subject to the threshold.
    allowed_paths: [src/approval.py, tests/**]
    forbidden_paths: [README.md]
    protected_paths: [hidden/**]
    solution_paths: [src/approval.py]
    verifier:
