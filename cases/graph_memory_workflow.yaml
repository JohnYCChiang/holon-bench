  - id: kg-use-004
    track: graph_memory_workflow
    language: python
    difficulty: medium
    task_type: active_graph_policy_recall
    fixture: fixtures/python/graph_tax_region
    user_request: >
      Update compute_tax so it applies the stored region-specific tax rates. The
      repository ships only the legacy flat rate; recover the per-region policy
      from project memory if it is not present in source files.
    constraints:
      - Preserve compute_tax(order) as the public API returning an int in minor units.
      - Missing or unknown regions must keep the legacy flat-rate fallback.
      - Do not hard-code unrelated examples from visible tests.
    knowledge_seed:
      - name: Regional Tax Rate Schedule
        kind: decision
        description: >
          Tax is computed in basis points by region: us-ca=725, us-or=0,
          eu-de=1900, eu-fr=2000, as amount * bps // 10000. Use the legacy flat
          1000 bps only when the region is missing or unrecognized.
    allowed_paths: [src/tax.py, tests/**]
    forbidden_paths: [README.md]
    protected_paths: [hidden/**]
    solution_paths: [src/tax.py]
    verifier:
      commands:
        - python3 -m unittest discover -s tests
      hidden_commands:
        - python3 hidden/verify_tax.py
      mutation_commands:
        - python3 hidden/verify_tax_mutation.py
      timeout_seconds: 30
      semantic_checks: [graph_context_used]
    scoring:
      hard_gates: [patch_applies, tests_pass, scope_pass, semantic_pass]
      soft_metrics: [functional_correctness, contract_compliance, observability]
    failure_tags: [graph_context_not_used, graph_tool_not_called, wrong_edge_case]

