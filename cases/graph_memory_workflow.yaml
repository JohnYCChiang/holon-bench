  - id: kg-use-008
    track: graph_memory_workflow
    language: python
    difficulty: hard
    task_type: active_graph_policy_recall
    fixture: fixtures/python/graph_currency_rounding
    user_request: >
      Extend format_amount to apply the stored per-currency precision policy. The
      currency exponents are not present in source files; recover them from
      project memory before implementing behavior.
    constraints:
      - Preserve format_amount(amount, currency) as the public API returning a string.
      - Keep ROUND_HALF_UP rounding and the two-decimal default for other currencies.
      - Do not hard-code unrelated examples from visible tests.
    knowledge_seed:
      - name: Currency Precision Policy
        kind: decision
        description: >
          Decimal places by currency: JPY=0, BHD=3, KWD=3, all others default to
          2. Amounts are quantized with ROUND_HALF_UP to the currency exponent and
          returned as a fixed-point string.
    allowed_paths: [src/money.py, tests/**]
    forbidden_paths: [README.md]
    protected_paths: [hidden/**]
    solution_paths: [src/money.py]
    verifier:
      commands:
