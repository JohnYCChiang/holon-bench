    fixture: fixtures/python/graph_naming_convention
    user_request: >
      Update resource_name to follow the stored project naming convention. The
      convention is not duplicated in source files; recover it from project memory
      if needed.
    constraints:
      - Preserve resource_name(spec) as the public API returning a string.
      - When env or team is missing, keep the legacy bare-name fallback unchanged.
