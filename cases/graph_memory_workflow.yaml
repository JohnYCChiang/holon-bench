      plan rules are not present in source files; recover them from project memory
      before implementing behavior.
    constraints:
      - Preserve sla_minutes(ticket) as the public API returning an int.
      - Unknown or missing priorities keep the legacy default window.
      - Do not hard-code unrelated examples from visible tests.
    knowledge_seed:
      - name: SLA Tier Mapping
        kind: decision
        description: >
          Response minutes by priority: p1=30, p2=120, p3=240, p4=1440. An
