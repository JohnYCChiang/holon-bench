name: CI

# Public CI runs STRUCTURE-ONLY checks. The case-execution pipeline (ci_smoke,
# golden-solve oracle, flakiness verify) needs the private answer key
# (fixtures/**/hidden + solutions/), which is intentionally not published — it
# lives in the private companion repo and is run there / locally. A public clone
# can validate schema and runner integrity but cannot execute or game the cases.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  schema-check:
    name: Schema Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Run schema check
        working-directory: ${{ github.workspace }}
        run: python3 runners/schema_check.py .

      - name: Validate documented runner commands
        run: python3 runners/docs_check.py .

  py-compile:
    name: Python Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile all runner modules
        run: python3 -m py_compile runners/*.py
